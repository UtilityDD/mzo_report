<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Booth Progress Dashboard - Malda Zone</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1rem;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            background-attachment: fixed;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .update-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: var(--primary);
            padding: 0.4rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 0.5rem;
        }

        .update-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 1.5rem;
            border-radius: 1.25rem;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        .stat-info h3 {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-info p {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* Progress Sections */
        .district-section {
            margin-bottom: 4rem;
        }

        .district-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .district-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .division-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .division-card {
            background: var(--card-bg);
            border-radius: 1.25rem;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }

        .division-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .division-name {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .division-stats {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
            margin: 1rem 0;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            width: 0%;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ccc-list-container {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            display: none;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .ccc-item {
            display: grid;
            grid-template-columns: 1.5fr repeat(4, 1fr);
            gap: 1rem;
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.8rem;
            align-items: center;
            min-width: 450px;
        }

        .ccc-item:last-child { border-bottom: none; }
        .ccc-item:hover { background: rgba(255,255,255,0.02); }

        .ccc-header {
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .toggle-ccc {
            width: 100%;
            background: none;
            border: none;
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .toggle-ccc:hover { color: var(--secondary); }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge-warning { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .badge-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        /* Table */
        .table-container {
            margin-top: 2rem;
            background: var(--card-bg);
            border-radius: 1.25rem;
            border: 1px solid var(--border);
            overflow-x: auto;
            display: none; /* Hidden by default, toggled via UI */
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 800px;
        }

        th {
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            h1 { font-size: 1.75rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .division-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <p>Fetching election data...</p>
    </div>

    <div class="container">
        <header>
            <h1>Election Booth Progress</h1>
            <p class="subtitle">DG arrangements & UPS installation - Malda Zone</p>
            <div id="last-update-container">
                <!-- Will be injected here -->
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i data-lucide="layout"></i></div>
                <div class="stat-info">
                    <h3>Total Booths</h3>
                    <p id="total-booths">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color: var(--primary); background: rgba(99, 102, 241, 0.1);"><i data-lucide="shield-check"></i></div>
                <div class="stat-info">
                    <h3>Backup Arranged</h3>
                    <p id="total-ensured">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color: var(--success); background: rgba(16, 185, 129, 0.1);"><i data-lucide="hammer"></i></div>
                <div class="stat-info">
                    <h3>Overall Installed</h3>
                    <p id="overall-installed-percent">0%</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color: var(--secondary); background: rgba(236, 72, 153, 0.1);"><i data-lucide="search"></i></div>
                <div class="stat-info">
                    <h3>Inspected</h3>
                    <p id="total-inspected">0%</p>
                </div>
            </div>
        </div>

        <div id="district-container">
            <!-- District sections will be injected here -->
        </div>

        <div style="text-align: center; margin-top: 2rem;">
            <button onclick="toggleTable()" id="toggle-btn" style="background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border); padding: 0.75rem 1.5rem; border-radius: 0.75rem; cursor: pointer; transition: all 0.3s;">
                Show Detailed CCC Breakdown
            </button>
        </div>

        <div id="table-view" class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>District</th>
                        <th>Division</th>
                        <th>CCC</th>
                        <th>Booths</th>
                        <th>Stations</th>
                        <th>DG</th>
                        <th>UPS</th>
                        <th>Ensured</th>
                        <th>Arranged %</th>
                        <th>Installed %</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Rows will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SHEET_ID = '1zdvDYaamr1GgFxolew40tWYglmQA3ZCEA3MIN46y_Is';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

        const DISTRICT_MAPPING = {
            'Dakshin Dinajpur': ['BALURGHAT', 'BUNIADPUR'],
            'Uttar Dinajpur': ['RAIGANJ', 'ISLAMPUR'],
            'Malda': ['MALDA', 'GAZOLE', 'CHANCHAL']
        };

        async function fetchData() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                parseAndRender(csvText);
            } catch (error) {
                console.error("Error fetching data:", error);
                alert("Failed to load data. Please check your internet connection.");
            } finally {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
            }
        }

        function parseAndRender(csv) {
            const lines = csv.split('\n');
            const data = [];
            
            // Skip header (first line is Source, second is empty, third is columns? Wait, looking at the view_file...)
            // 5th line was the header in my preview.
            let headerFound = false;
            for (let i = 0; i < lines.length; i++) {
                const row = lines[i].split(',').map(cell => cell.trim().replace(/^"|"$/g, ''));
                if (row[0] === 'Division' && !headerFound) {
                    headerFound = true;
                    continue;
                }
                if (headerFound && row[0] && row[1]) {
                    data.push(row);
                }
            }

            // Grouping Logic
            const groups = {
                'Dakshin Dinajpur': {},
                'Uttar Dinajpur': {},
                'Malda': {},
                'Others': {}
            };

            let totals = { booths: 0, stations: 0, ensured: 0, inspected: 0, installed: 0, dg: 0, ups: 0 };
            let lastUpdate = '';

            data.forEach(row => {
                const divName = row[0].toUpperCase();
                const cccName = row[1];
                const booths = parseInt(row[2]) || 0;
                const stations = parseInt(row[3]) || 0;
                const dg = parseInt(row[4]) || 0;
                const ups = parseInt(row[5]) || 0;
                const ensured = parseInt(row[6]) || 0;
                const inspected = parseInt(row[7]) || 0;
                const installed = parseInt(row[13]) || 0;
                if (row[15]) lastUpdate = row[15];

                let district = 'Others';
                for (const [dist, divisions] of Object.entries(DISTRICT_MAPPING)) {
                    if (divisions.includes(divName)) {
                        district = dist;
                        break;
                    }
                }

                if (!groups[district][divName]) groups[district][divName] = [];
                groups[district][divName].push({
                    ccc: cccName,
                    booths,
                    stations,
                    dg,
                    ups,
                    ensured,
                    inspected,
                    installed
                });

                totals.booths += booths;
                totals.stations += stations;
                totals.ensured += ensured;
                totals.inspected += inspected;
                totals.installed += installed;
                totals.dg += dg;
                totals.ups += ups;
            });

            // Update Summary
            const overallInstPercent = totals.stations ? Math.round((totals.installed / totals.stations) * 100) : 0;
            const overallInspPercent = totals.stations ? Math.round((totals.inspected / totals.stations) * 100) : 0;

            document.getElementById('total-booths').innerHTML = `${totals.booths.toLocaleString()} <span style="font-size: 0.8rem; font-weight: 400; color: var(--text-muted); display: block;">(${totals.stations.toLocaleString()} Locations)</span>`;
            document.getElementById('total-ensured').innerHTML = `${totals.ensured.toLocaleString()} <span style="font-size: 0.8rem; font-weight: 400; color: var(--text-muted); display: block;">(DG: ${totals.dg} | UPS: ${totals.ups})</span>`;
            document.getElementById('overall-installed-percent').innerHTML = `${overallInstPercent}% <span style="font-size: 0.8rem; font-weight: 400; color: var(--text-muted); display: block;">Inst: ${totals.installed} / Arr: ${totals.ensured}</span>`;
            document.getElementById('total-inspected').innerText = overallInspPercent + '%';
            
            if (lastUpdate) {
                document.getElementById('last-update-container').innerHTML = `
                    <div class="update-badge">
                        <span class="update-dot"></span>
                        <span>Last Updated: ${lastUpdate}</span>
                    </div>
                `;
            }

            renderUI(groups);
            renderTable(groups);
        }

        function renderUI(groups) {
            const container = document.getElementById('district-container');
            container.innerHTML = '';

            for (const [district, divisions] of Object.entries(groups)) {
                if (Object.keys(divisions).length === 0) continue;

                const section = document.createElement('div');
                section.className = 'district-section';
                
                // Calculate District Progress
                let dStations = 0, dInstalled = 0, dEnsured = 0, dBooths = 0, dDG = 0, dUPS = 0;
                for (const divRows of Object.values(divisions)) {
                    divRows.forEach(r => { 
                        dStations += r.stations; 
                        dInstalled += r.installed; 
                        dEnsured += r.ensured;
                        dBooths += r.booths;
                        dDG += r.dg;
                        dUPS += r.ups;
                    });
                }
                const dInstPercent = dStations ? Math.round((dInstalled / dStations) * 100) : 0;
                const dEnsPercent = dStations ? Math.round((dEnsured / dStations) * 100) : 0;
                
                section.innerHTML = `
                    <div class="district-header" style="margin-bottom: 0.5rem;">
                        <i data-lucide="map-pin" style="color: var(--primary);"></i>
                        <h2 style="flex: 1;">${district}</h2>
                        <div style="display: flex; gap: 0.5rem;">
                            <span class="badge" style="background: rgba(99, 102, 241, 0.1); color: var(--primary);">Arranged: ${dEnsPercent}%</span>
                            <span class="badge ${dInstPercent >= 100 ? 'badge-success' : (dInstPercent > 50 ? 'badge-warning' : 'badge-danger')}">Installed: ${dInstPercent}%</span>
                        </div>
                    </div>
                    <div style="display: flex; gap: 2rem; margin-bottom: 2rem; padding: 0.75rem 1.25rem; background: rgba(255,255,255,0.03); border-radius: 0.75rem; font-size: 0.875rem; color: var(--text-muted); border: 1px dashed var(--border);">
                        <div><strong style="color: var(--text-main);">${dBooths}</strong> Booths</div>
                        <div><strong style="color: var(--text-main);">${dStations}</strong> Locations</div>
                        <div><strong style="color: var(--text-main);">${dEnsured}</strong> Arranged <span style="font-size: 0.75rem;">(DG: ${dDG}, UPS: ${dUPS})</span></div>
                        <div><strong style="color: var(--text-main);">${dInstalled}</strong> Installed</div>
                    </div>
                    <div class="division-grid"></div>
                `;

                const grid = section.querySelector('.division-grid');
                
                for (const [divName, cccs] of Object.entries(divisions)) {
                    let divStations = 0, divEnsured = 0, divBooths = 0, divInstalled = 0, divInspected = 0;
                    let divDG = 0, divUPS = 0;
                    cccs.forEach(c => {
                        divStations += c.stations;
                        divEnsured += c.ensured;
                        divBooths += c.booths;
                        divInstalled += c.installed;
                        divInspected += c.inspected;
                        divDG += c.dg;
                        divUPS += c.ups;
                    });
                    const divPercent = divStations ? Math.round((divEnsured / divStations) * 100) : 0;
                    const instPercent = divStations ? Math.round((divInstalled / divStations) * 100) : 0;
                    
                    let divDisplayLabel = `<div style="font-weight: 700;">${divPercent}%</div>`;
                    if (divEnsured > divStations) {
                        divDisplayLabel = `<div style="font-weight: 700;">100% Arranged</div><div style="color: var(--primary);">+${divEnsured - divStations} spare</div>`;
                    } else if (divEnsured === divStations && divStations > 0) {
                        divDisplayLabel = `<div style="font-weight: 700;">100% Arranged</div><div style="color: var(--danger);">0 spare</div>`;
                    }

                    const card = document.createElement('div');
                    card.className = 'division-card';
                    card.innerHTML = `
                        <div class="division-info">
                            <span class="division-name">${divName}</span>
                            <span class="division-stats">${divBooths} Booths | ${divStations} Loc.</span>
                        </div>
                        
                        <div class="progress-labels" style="margin-bottom: 4px;">
                            <span>Installed: ${divInstalled}/${divStations}</span>
                            <span style="color: var(--success); font-weight: 700;">${instPercent}%</span>
                        </div>
                        <div class="progress-container" style="margin: 0 0 16px 0; height: 12px; background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.1);">
                            <div class="progress-bar" style="width: ${instPercent}%; background: var(--success);"></div>
                        </div>

                        <div class="progress-labels" style="margin-bottom: 4px; font-size: 0.75rem; opacity: 0.8; align-items: flex-start;">
                            <div>
                                <div>Arranged: ${divEnsured}/${divStations}</div>
                                <div style="font-weight: 500;">(DG: ${divDG}, UPS: ${divUPS})</div>
                            </div>
                            <div style="text-align: right;">${divDisplayLabel}</div>
                        </div>
                        <div class="progress-container" style="margin: 0; height: 6px; background: rgba(255, 255, 255, 0.03);">
                            <div class="progress-bar" style="width: ${divPercent}%; opacity: 0.6;"></div>
                        </div>

                        <div id="ccc-list-${divName.replace(/\s+/g, '-')}" class="ccc-list-container">
                            <div class="ccc-item ccc-header" style="grid-template-columns: 1.5fr repeat(5, 1fr);">
                                <div>CCC Name</div>
                                <div>Bth/Loc</div>
                                <div>Arranged</div>
                                <div style="text-align: center;">Arr %</div>
                                <div>Installed</div>
                                <div style="text-align: right;">Inst %</div>
                            </div>
                            ${cccs.map(c => {
                                const arrPercent = c.stations ? Math.round((c.ensured/c.stations)*100) : 0;
                                const instPercent = c.stations ? Math.round((c.installed/c.stations)*100) : 0;
                                
                                let arrLabel = `<div style="font-weight: 600;">${arrPercent}%</div>`;
                                if (c.ensured > c.stations) {
                                    arrLabel = `<div style="font-weight: 600;">100%</div><div style="font-size: 0.7rem; color: var(--primary);">+${c.ensured - c.stations} spare</div>`;
                                } else if (c.ensured === c.stations && c.stations > 0) {
                                    arrLabel = `<div style="font-weight: 600;">100%</div><div style="font-size: 0.7rem; color: var(--danger);">0 spare</div>`;
                                }

                                return `
                                <div class="ccc-item" style="grid-template-columns: 1.5fr repeat(5, 1fr);">
                                    <div style="font-weight: 500;">${c.ccc}</div>
                                    <div>${c.booths}/${c.stations}</div>
                                    <div title="DG: ${c.dg}, UPS: ${c.ups}">
                                        <div style="font-size: 0.7rem;">${c.ensured}</div>
                                        <div style="font-size: 0.65rem; opacity: 0.7;">D:${c.dg}, U:${c.ups}</div>
                                    </div>
                                    <div style="text-align: center;">${arrLabel}</div>
                                    <div>${c.installed}</div>
                                    <div style="text-align: right; color:${instPercent >= 100 ? 'var(--success)' : 'inherit'}; font-weight: 700;">
                                        ${instPercent}%
                                    </div>
                                </div>
                            `;}).join('')}
                        </div>

                        <button class="toggle-ccc" onclick="toggleCCCList('ccc-list-${divName.replace(/\s+/g, '-')}', this)">
                            <i data-lucide="chevron-down" style="width: 14px; height: 14px;"></i>
                            <span>View CCC Details</span>
                        </button>
                    `;
                    grid.appendChild(card);
                }
                container.appendChild(section);
            }
            lucide.createIcons();
        }

        function renderTable(groups) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            for (const [district, divisions] of Object.entries(groups)) {
                for (const [divName, cccs] of Object.entries(divisions)) {
                    cccs.forEach(c => {
                        const arrPercent = c.stations ? Math.round((c.ensured / c.stations) * 100) : 0;
                        const instPercent = c.stations ? Math.round((c.installed / c.stations) * 100) : 0;
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${district}</td>
                            <td>${divName}</td>
                            <td>${c.ccc}</td>
                            <td>${c.booths}</td>
                            <td>${c.stations}</td>
                            <td>${c.dg}</td>
                            <td>${c.ups}</td>
                            <td>${c.ensured}</td>
                            <td>
                                <span class="badge" style="background: rgba(99, 102, 241, 0.1); color: var(--primary);">${c.ensured > c.stations ? '100%+' + (c.ensured-c.stations) : arrPercent+'%'}</span>
                            </td>
                            <td>
                                <span class="badge ${instPercent >= 100 ? 'badge-success' : 'badge-warning'}">${instPercent}%</span>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                }
            }
        }

        function toggleTable() {
            const table = document.getElementById('table-view');
            const btn = document.getElementById('toggle-btn');
            if (table.style.display === 'none' || !table.style.display) {
                table.style.display = 'block';
                btn.innerText = 'Hide Detailed Breakdown';
                table.scrollIntoView({ behavior: 'smooth' });
            } else {
                table.style.display = 'none';
                btn.innerText = 'Show Detailed CCC Breakdown';
            }
        }

        function toggleCCCList(id, btn) {
            const list = document.getElementById(id);
            const isHidden = list.style.display === 'none' || !list.style.display;
            list.style.display = isHidden ? 'block' : 'none';
            
            const span = btn.querySelector('span');
            const icon = btn.querySelector('i');
            
            if (isHidden) {
                span.innerText = 'Hide CCC Details';
                btn.querySelector('[data-lucide]').setAttribute('data-lucide', 'chevron-up');
            } else {
                span.innerText = 'View CCC Details';
                btn.querySelector('[data-lucide]').setAttribute('data-lucide', 'chevron-down');
            }
            lucide.createIcons();
        }

        window.onload = fetchData;
    </script>
</body>
</html>
