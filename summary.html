<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Consolidated Executive Summary</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 0.1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 0.1) 0, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(51, 65, 85, 0.8);
            transform: translateY(-2px);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: block;
            color: inherit;
        }

        .kpi-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(51, 65, 85, 0.4);
        }

        .kpi-card:active {
            transform: translateY(-2px);
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }

        .kpi-card.capex::before {
            background-color: var(--accent-blue);
        }

        .kpi-card.nsc::before {
            background-color: var(--accent-purple);
        }

        .kpi-card.advances::before {
            background-color: var(--accent-orange);
        }

        .kpi-card.safety::before {
            background-color: var(--accent-green);
        }

        .kpi-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .kpi-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .kpi-icon {
            font-size: 20px;
            opacity: 0.8;
        }

        .capex .kpi-icon {
            color: var(--accent-blue);
        }

        .nsc .kpi-icon {
            color: var(--accent-purple);
        }

        .advances .kpi-icon {
            color: var(--accent-orange);
        }

        .safety .kpi-icon {
            color: var(--accent-green);
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .kpi-subtext {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .kpi-trend {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            margin-top: 10px;
        }

        .trend-up {
            color: var(--accent-green);
        }

        .trend-down {
            color: var(--accent-red);
        }

        .shimmer {
            display: inline-block;
            height: 1em;
            position: relative;
            overflow: hidden;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            min-width: 80px;
            vertical-align: middle;
        }

        .shimmer::after {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            transform: translateX(-100%);
            background-image: linear-gradient(90deg,
                    rgba(255, 255, 255, 0) 0,
                    rgba(255, 255, 255, 0.05) 20%,
                    rgba(255, 255, 255, 0.2) 60%,
                    rgba(255, 255, 255, 0));
            animation: shimmer 1.5s infinite;
            content: '';
        }

        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 15px;
            }

            .header h1 {
                font-size: 20px;
            }

            .kpi-card {
                padding: 20px;
            }

            .kpi-value {
                font-size: 28px;
            }
        }
    </style>
    <style>
        .home-float-btn {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="summary-grid" id="summaryGrid">
            <!-- NSC KPI -->
            <a href="nsc.html" class="kpi-card nsc">
                <div class="kpi-header">
                    <span class="kpi-title">Pending NSC</span>
                    <i class="fas fa-plug kpi-icon"></i>
                </div>
                <div class="kpi-value"><span id="nscValue" class="shimmer"></span></div>
                <div class="kpi-trend" id="nscSecondary">
                    <i class="fas fa-info-circle"></i>
                    <span id="nscNonPole" class="shimmer"></span>
                    <span>Non-Pole Cases</span>
                </div>
            </a>

            <!-- CAPEX KPI -->
            <a href="capex_all.html" class="kpi-card capex">
                <div class="kpi-header">
                    <span class="kpi-title">CAPEX Advance</span>
                    <i class="fas fa-hand-holding-usd kpi-icon"></i>
                </div>
                <div class="kpi-value"><span id="capexValue" class="shimmer"></span></div>
                <div class="kpi-trend" id="capexSecondary">
                    <i class="fas fa-clock"></i>
                    <span id="capexAgeing" class="shimmer"></span>
                    <span>for >18M</span>
                </div>
            </a>

            <!-- REM OSD KPI -->
            <a href="remosd5000.html" class="kpi-card advances">
                <div class="kpi-header">
                    <span class="kpi-title">Latest REM OSD</span>
                    <i class="fas fa-file-invoice-dollar kpi-icon"></i>
                </div>
                <div class="kpi-value"><span id="remValue" class="shimmer"></span></div>
                <div class="kpi-trend" id="remSecondary">
                    <i class="fas fa-building"></i>
                    <span id="remComInd" class="shimmer"></span>
                    <span>for COM & IND</span>
                </div>
            </a>

            <!-- Defective Meter KPI -->
            <a href="consumer/defective_meter.html" class="kpi-card safety">
                <div class="kpi-header">
                    <span class="kpi-title">Total Defective Meter</span>
                    <i class="fas fa-tachometer-alt kpi-icon"></i>
                </div>
                <div class="kpi-value"><span id="defectiveValue" class="shimmer"></span></div>
                <div class="kpi-trend" id="defectiveSecondary">
                    <i class="fas fa-industry"></i>
                    <span id="defectiveIndSmart" class="shimmer"></span>
                </div>
            </a>

            <!-- CMO KPI -->
            <a href="cmo.html" class="kpi-card capex">
                <div class="kpi-header">
                    <span class="kpi-title">CMO Pending</span>
                    <i class="fas fa-exclamation-circle kpi-icon" style="color: var(--accent-red);"></i>
                </div>
                <div class="kpi-value"><span id="cmoValue" class="shimmer"></span></div>
                <div class="kpi-trend" id="cmoSecondary">
                    <i class="fas fa-check-circle"></i>
                    <span>Disposed: </span>
                    <span id="cmoDisposed" class="shimmer"></span>
                </div>
            </a>

            <!-- Safety Inspection KPI -->
            <a href="safety_inspection.html" class="kpi-card safety">
                <div class="kpi-header">
                    <span class="kpi-title">Safety Inspection</span>
                    <i class="fas fa-shield-alt kpi-icon"></i>
                </div>
                <div class="kpi-value"><span id="safetyValue" class="shimmer"></span></div>
                <div class="kpi-trend" id="safetySecondary">
                    <i class="fas fa-clock"></i>
                    <span>Pending: </span>
                    <span id="safetyPending" class="shimmer"></span>
                    <span style="margin-left: 8px;">(<span id="safetyPercent" class="shimmer"></span>%)</span>
                </div>
            </a>
        </div>
    </div>

    <!-- Include PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        async function fetchJsonData(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error(`Could not fetch JSON from ${url}:`, error);
                return null;
            }
        }

        async function fetchCsvData(url) {
            return new Promise((resolve, reject) => {
                Papa.parse(url, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => resolve(results.data),
                    error: (error) => {
                        console.error(`Could not fetch CSV from ${url}:`, error);
                        resolve(null);
                    }
                });
            });
        }

        function formatInCrore(valueInRs) {
            const crore = valueInRs / 10000000;
            return crore.toFixed(2) + ' Crore';
        }

        function formatInCroreFromLakhs(valueInLakhs) {
            const crore = valueInLakhs / 100;
            return crore.toFixed(2) + ' Crore';
        }

        async function initDashboard() {
            // Data URLs
            const WEEKLY_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMuO-ddereEG6J2s2Bmqp-HXo85ky4S4R5Yt-0HdoNHHa5r8xOEK4MJ1Syhyqzjpm2lTI4sT85nR4N/pub?gid=0&single=true&output=csv";
            const DEFECTIVE_CSV_URL = "consumer/defective_meter.csv";
            const CMO_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS7GVh5HflVhouhVfFOEN2RuA1kCBedmD4Q0CJP02K61DAtWuo3P8XIS8CO7ocZQuJ20uCJBa9qsgZ6/pub?gid=1066071765&single=true&output=csv";
            const SAFETY_JSON_URL = "data/safety_inspection.json";

            // Concurrent data loading
            const [nscData, advancesData, remData, weeklyData, defectiveData, cmoData, safetyData] = await Promise.all([
                fetchJsonData('data/nsc.json'),
                fetchJsonData('data/capexall.json'),
                fetchJsonData('data/rem.json'),
                fetchCsvData(WEEKLY_CSV_URL),
                fetchCsvData(DEFECTIVE_CSV_URL),
                fetchCsvData(CMO_CSV_URL),
                fetchJsonData(SAFETY_JSON_URL)
            ]);

            // 1. Process NSC
            if (nscData) {
                const totalPending = nscData.length;
                const nonPoleCount = _.filter(nscData, item => item.PoleNonPole === "Non Pole Case").length;

                const nscValEl = document.getElementById('nscValue');
                nscValEl.textContent = totalPending.toLocaleString();
                nscValEl.classList.remove('shimmer');

                const nscNonPoleEl = document.getElementById('nscNonPole');
                nscNonPoleEl.textContent = nonPoleCount.toLocaleString();
                nscNonPoleEl.classList.remove('shimmer');
            }

            // 2. Process CAPEX Advance
            if (advancesData) {
                const totalOutstanding = _.sumBy(advancesData, item => {
                    const val = String(item["Net Balance Value"] || 0).replace(/,/g, '');
                    return parseFloat(val) || 0;
                });

                const ageing18MVal = _.sumBy(_.filter(advancesData, item => parseInt(item["Ageing in Days"] || 0) > 540), item => {
                    const val = String(item["Net Balance Value"] || 0).replace(/,/g, '');
                    return parseFloat(val) || 0;
                });

                const capexValEl = document.getElementById('capexValue');
                capexValEl.textContent = formatInCrore(totalOutstanding);
                capexValEl.classList.remove('shimmer');

                let ageingText = "";
                if (ageing18MVal >= 10000000) {
                    ageingText = (ageing18MVal / 10000000).toFixed(2) + " Crore";
                } else {
                    ageingText = (ageing18MVal / 100000).toFixed(2) + " Lakh";
                }
                const capexAgeingEl = document.getElementById('capexAgeing');
                capexAgeingEl.textContent = ageingText;
                capexAgeingEl.classList.remove('shimmer');
            }

            // 3. Process REM OSD
            if (remData) {
                // Find the latest date
                const dates = [...new Set(remData.map(r => r["Notice Due Date"]?.trim()))]
                    .filter(Boolean)
                    .sort((a, b) => {
                        const [da, ma, ya] = a.split('/').map(Number);
                        const [db, mb, yb] = b.split('/').map(Number);
                        return new Date(yb, mb - 1, db) - new Date(ya, ma - 1, da);
                    });
                const latestDate = dates[0];

                // Filter data for the latest date
                const latestRemData = remData.filter(item => item["Notice Due Date"] === latestDate);

                const totalLakhs = _.sumBy(latestRemData, item => parseFloat(item["Total-Amount in Lakhs"] || 0));
                const totalDefaulters = _.sumBy(latestRemData, item => parseInt(item["Total-Count"] || 0, 10));

                document.getElementById('remValue').textContent = formatInCroreFromLakhs(totalLakhs);
                document.getElementById('remValue').classList.remove('shimmer');

                const remSecondaryContainer = document.getElementById('remSecondary');
                remSecondaryContainer.innerHTML = `
                    <i class="fas fa-users"></i>
                    <span>${totalDefaulters.toLocaleString()}</span>
                    <span>Defaulters</span>
                `;
            }

            // 4. Process Defective Meter
            if (defectiveData) {
                // Since CSV might not have headers, we use indices if header parsing fails or if we know the structure
                // But PapaParse with header:true was used. If CSV has no header, we might need a different approach.
                // Re-parsing without headers if it seems necessary, but let's assume it has or handle rows.

                // From defective_meter.html, index 0 might be BASE_CLASS and index for METER_NO exists.
                // Actually the CSV we saw earlier was raw. Let's assume header or map by field names if PapaParse found them.
                const firstRow = defectiveData[0] || {};
                const hasHeaders = "CCC_CODE" in firstRow;

                let totalDefective = defectiveData.length;
                let indCount = 0;
                let smartCount = 0;

                defectiveData.forEach(row => {
                    const baseClass = hasHeaders ? row.BASE_CLASS : Object.values(row)[11]; // Assuming index 11 for BASE_CLASS
                    const meterNo = hasHeaders ? row.METER_NO : Object.values(row)[4]; // Assuming index 4 for METER_NO

                    if (baseClass === 'I') indCount++;
                    if (/^IJ|^IL|^IT/.test(meterNo || '')) smartCount++;
                });

                const defectiveValEl = document.getElementById('defectiveValue');
                defectiveValEl.textContent = totalDefective.toLocaleString();
                defectiveValEl.classList.remove('shimmer');

                const defectiveIndSmartEl = document.getElementById('defectiveIndSmart');
                defectiveIndSmartEl.textContent = `Ind: ${indCount}, Smart: ${smartCount}`;
                defectiveIndSmartEl.classList.remove('shimmer');
            }

            // 5. Process Total Pending (Weekly Sheet)
            if (weeklyData) {
                // Find the latest date string
                const dates = _.uniq(weeklyData.map(d => d["Date of report in Current Week"]).filter(Boolean));
                const latestDateStr = _.orderBy(dates, [d => {
                    const parts = d.split('/');
                    return new Date(parts[2], parts[1] - 1, parts[0]);
                }], ['desc'])[0];

                if (latestDateStr) {
                    const latestRecords = _.filter(weeklyData, d => d["Date of report in Current Week"] === latestDateStr);

                    const pendingValue = _.sumBy(latestRecords, d => parseFloat(d["Pending as on Monday of Current Week (All)"] || 0));
                    const disposedValue = _.sumBy(latestRecords, d => parseFloat(d["Total disposed (All)"] || 0));

                    const cmoValEl = document.getElementById('cmoValue');
                    cmoValEl.textContent = Math.round(pendingValue).toLocaleString();
                    cmoValEl.classList.remove('shimmer');

                    const cmoDisposedEl = document.getElementById('cmoDisposed');
                    cmoDisposedEl.textContent = Math.round(disposedValue).toLocaleString();
                    cmoDisposedEl.classList.remove('shimmer');
                }
            }

            // 6. Process CMO Data
            if (cmoData) {
                const targetDistricts = ["Uttar Dinajpur", "Malda", "Dakshin Dinajpur"];
                const filteredCmo = cmoData.filter(d => targetDistricts.includes(d["District"]?.trim()));

                const cmoPending = filteredCmo.filter(item => (item["Pending With"] || "").trim() !== "Disposed / pending with HQ").length;
                const cmoDisposed = filteredCmo.filter(item => (item["Pending With"] || "").trim() === "Disposed / pending with HQ").length;

                const cmoValEl = document.getElementById('cmoValue');
                cmoValEl.textContent = cmoPending.toLocaleString();
                cmoValEl.classList.remove('shimmer');

                const cmoDisposedEl = document.getElementById('cmoDisposed');
                cmoDisposedEl.textContent = cmoDisposed.toLocaleString();
                cmoDisposedEl.classList.remove('shimmer');
            }

            // 7. Process Safety Inspection
            if (safetyData) {
                // Mirror logic from safety_inspection.html: Group by 'Site ID'
                const groupBy = 'Site ID';
                const uniqueKeys = new Set();
                const uniqueData = safetyData.filter(row => {
                    const key = row[groupBy];
                    if (key && !uniqueKeys.has(key)) {
                        uniqueKeys.add(key);
                        return true;
                    }
                    return false;
                });

                const total = uniqueData.length;
                const rectifiedCount = uniqueData.filter(item =>
                    item['Rectification done on'] && String(item['Rectification done on']).trim() !== ''
                ).length;

                const pendingCount = total - rectifiedCount;
                const percent = total > 0 ? Math.round((pendingCount / total) * 100) : 0;

                const safetyValEl = document.getElementById('safetyValue');
                safetyValEl.textContent = total.toLocaleString();
                safetyValEl.classList.remove('shimmer');

                const safetyPendingEl = document.getElementById('safetyPending');
                safetyPendingEl.textContent = pendingCount.toLocaleString();
                safetyPendingEl.classList.remove('shimmer');

                const safetyPercentEl = document.getElementById('safetyPercent');
                safetyPercentEl.textContent = percent;
                safetyPercentEl.classList.remove('shimmer');
            }
        }

        window.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>

</html>
