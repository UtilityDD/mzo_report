<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Weekly Disposal Status: NSC (Averages)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
  <script src="mzo_data_hub.js"></script>
  <style>
    .card-header {
      cursor: pointer;
    }

    .card-body {
      cursor: pointer;
    }

    .region-row,
    .division-row,
    .ccc-row {
      cursor: pointer;
    }

    .nested-row {
      display: none;
    }

    .show-row {
      display: table-row;
    }

    .toggle-icon {
      margin-right: 5px;
      display: inline-block;
      transition: transform 0.2s;
    }

    .expanded .toggle-icon {
      transform: rotate(90deg);
    }

    .date-row {
      background-color: #f8f9fa !important;
    }

    .filter-container {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
      align-items: center;
    }

    .filter-item {
      flex: 1;
      min-width: 120px;
    }

    .filter-select {
      padding: 0.25rem 0.5rem;
      font-size: 0.85rem;
    }

    .metric-label {
      font-style: italic;
      font-size: 0.85rem;
      color: #6c757d;
      margin-right: 5px;
    }

    .metric-value {
      font-weight: 500;
    }

    @media (max-width: 768px) {
      body {
        font-size: 0.8rem;
      }

      .table {
        font-size: 0.75rem;
      }

      h2 {
        font-size: 1.5rem;
      }

      h5 {
        font-size: 0.9rem;
      }

      .form-select {
        font-size: 0.8rem;
        padding: 0.25rem;
      }

      .card-header {
        font-size: 0.9rem;
        padding: 0.5rem 0.75rem;
      }

      .container {
        padding-left: 0.5rem;
        padding-right: 0.5rem;
      }

      .filter-container {
        gap: 0.25rem;
      }

      .filter-item {
        min-width: 90px;
      }

      .metric-label {
        font-size: 0.75rem;
      }
    }
  </style>
</head>

<body class="bg-light">

  <div class="container mt-4">
    <h2 class="text-center mb-1">Weekly Disposal Status: NSC</h2>
    <p class="text-center mb-4" id="report-date">Report upto: Loading...</p>

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-3" id="category-tabs">
      <li class="nav-item"><a class="nav-link active" data-type="ALL" href="#">All</a></li>
      <li class="nav-item"><a class="nav-link" data-type="DOM" href="#">DOM</a></li>
      <li class="nav-item"><a class="nav-link" data-type="COM" href="#">COM</a></li>
      <li class="nav-item"><a class="nav-link" data-type="IND" href="#">IND</a></li>
    </ul>

    <!-- Compact Filters -->
    <div class="filter-container">
      <div class="filter-item">
        <select id="date-filter" class="form-select form-select-sm filter-select">
          <option value="">All Dates</option>
        </select>
      </div>
      <div class="filter-item">
        <select id="region-filter" class="form-select form-select-sm filter-select">
          <option value="">All Regions</option>
        </select>
      </div>
      <div class="filter-item">
        <select id="division-filter" class="form-select form-select-sm filter-select">
          <option value="">All Divisions</option>
        </select>
      </div>
      <div class="filter-item">
        <select id="ccc-filter" class="form-select form-select-sm filter-select">
          <option value="">All CCCs</option>
        </select>
      </div>
    </div>

    <!-- Cards -->
    <div class="row g-4">
      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-header bg-primary text-white" data-bs-toggle="collapse"
            data-bs-target="#pending-table-wrapper">
            Pending: Monday vs Monday (Averages)
          </div>
          <div class="card-body">
            <h5 id="pending-avg" class="card-title">
              <span class="loading-text">Loading</span><span id="pending-dots">...</span>
            </h5>
            <div class="collapse show" id="pending-table-wrapper">
              <div id="pending-table" class="mt-3"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-header bg-success text-white" data-bs-toggle="collapse"
            data-bs-target="#deposit-table-wrapper">
            Weekly Deposit vs Disposal (Averages)
          </div>
          <div class="card-body">
            <h5 id="deposit-avg" class="card-title">
              <span class="loading-text">Loading</span><span id="deposit-dots">...</span>
            </h5>
            <div class="collapse show" id="deposit-table-wrapper">
              <div id="deposit-table" class="mt-3"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="chart-container-row"></div>
  </div>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMuO-ddereEG6J2s2Bmqp-HXo85ky4S4R5Yt-0HdoNHHa5r8xOEK4MJ1Syhyqzjpm2lTI4sT85nR4N/pub?gid=0&single=true&output=csv";
    let allData = [], filteredData = [], category = "ALL";
    const filters = { date: '', region: '', division: '', ccc: '' };

    function formatDate(dateStr) {
      if (typeof dateStr !== 'string' || !/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(dateStr)) return dateStr;
      const [day, month, year] = dateStr.split('/').map(Number);
      return `${String(day).padStart(2, '0')}/${String(month).padStart(2, '0')}/${year}`;
    }

    function updateSelect(id, options, formatFn) {
      const select = document.getElementById(id);
      const currentValue = select.value;
      let defaultText = 'All';
      if (id === 'date-filter') defaultText = 'Select Date';
      else if (id === 'region-filter') defaultText = 'Select Region';
      else if (id === 'division-filter') defaultText = 'Select Division';
      else if (id === 'ccc-filter') defaultText = 'Select CCC';

      select.innerHTML = `<option value="">${defaultText}</option>`;
      options.forEach(opt => {
        const option = document.createElement('option');
        option.value = opt;
        option.textContent = formatFn ? formatFn(opt) : opt;
        select.appendChild(option);
      });
      if (currentValue && options.includes(currentValue)) select.value = currentValue;
    }

    function updateFilteredData() {
      filteredData = allData.filter(row => !filters.date || row["Date of report in Current Week"] === filters.date);
    }

    function populateDependentFilters() {
      const regions = [...new Set(filteredData.map(d => d.Region).filter(Boolean))].sort();
      updateSelect('region-filter', regions);

      const divisions = [...new Set(filteredData
        .filter(d => !filters.region || d.Region === filters.region)
        .map(d => d.Division).filter(Boolean))].sort();
      updateSelect('division-filter', divisions);

      const cccs = [...new Set(filteredData
        .filter(d => (!filters.region || d.Region === filters.region) && (!filters.division || d.Division === filters.division))
        .map(d => d.CCC).filter(Boolean))].sort();
      updateSelect('ccc-filter', cccs);
    }

    function populateFilters() {
      const dates = [...new Set(allData.map(d => d["Date of report in Current Week"]).filter(Boolean))].sort((a, b) => {
        const pA = a.split('/').map(Number); const pB = b.split('/').map(Number);
        return new Date(pB[2], pB[1] - 1, pB[0]) - new Date(pA[2], pA[1] - 1, pA[0]);
      });
      updateSelect('date-filter', dates, formatDate);

      document.getElementById('date-filter').addEventListener('change', e => { filters.date = e.target.value; updateFilteredData(); populateDependentFilters(); render(); });
      document.getElementById('region-filter').addEventListener('change', e => { filters.region = e.target.value; filters.division = ''; filters.ccc = ''; updateFilteredData(); populateDependentFilters(); render(); });
      document.getElementById('division-filter').addEventListener('change', e => { filters.division = e.target.value; filters.ccc = ''; updateFilteredData(); populateDependentFilters(); render(); });
      document.getElementById('ccc-filter').addEventListener('change', e => { filters.ccc = e.target.value; updateFilteredData(); render(); });

      updateFilteredData();
      populateDependentFilters();
    }

    function applyRowFilters(row) {
      return (!filters.region || row.Region === filters.region) &&
        (!filters.division || row.Division === filters.division) &&
        (!filters.ccc || row.CCC === filters.ccc);
    }

    function buildNestedTable(containerId, rows, types, col1Base, col2Base) {
      const col1Short = col1Base.includes("Pending") ? "Last Monday" : "Deposited";
      const col2Short = col1Base.includes("Pending") ? "This Monday" : "Disposed";
      const grouped = {};

      rows.forEach(row => {
        const r = row.Region || 'Unknown', d = row.Division || 'Unknown', c = row.CCC || 'Unknown', dt = row["Date of report in Current Week"] || 'Unknown';
        if (!grouped[r]) grouped[r] = { divisions: {}, cccAverages: [], avgValues: { avg1: 0, avg2: 0 } };
        if (!grouped[r].divisions[d]) grouped[r].divisions[d] = { cccs: {}, cccAverages: [], avgValues: { avg1: 0, avg2: 0 } };
        if (!grouped[r].divisions[d].cccs[c]) grouped[r].divisions[d].cccs[c] = { dates: {}, dateValues: {}, avgValues: { avg1: 0, avg2: 0 } };
        const cccData = grouped[r].divisions[d].cccs[c];
        if (!cccData.dates[dt]) cccData.dates[dt] = { total1: 0, total2: 0, data: row, hasData: false };
      });

      Object.keys(grouped).forEach(r => {
        Object.keys(grouped[r].divisions).forEach(d => {
          Object.keys(grouped[r].divisions[d].cccs).forEach(c => {
            const cccData = grouped[r].divisions[d].cccs[c];
            Object.keys(cccData.dates).forEach(dt => {
              const dateData = cccData.dates[dt];
              let t1 = 0, t2 = 0, has = false;
              types.forEach(type => {
                const c1 = type === "All" ? `${col1Base} (All)` : `${col1Base} (${type})`;
                const c2 = type === "All" ? `${col2Base} (All)` : `${col2Base} (${type})`;
                const v1 = parseInt(dateData.data[c1] || 0), v2 = parseInt(dateData.data[c2] || 0);
                t1 += v1; t2 += v2; if (v1 || v2) has = true;
              });
              dateData.total1 = t1; dateData.total2 = t2; dateData.hasData = has;
              if (has) cccData.dateValues[dt] = { t1, t2 };
            });
            const vals = Object.values(cccData.dateValues);
            if (vals.length > 0) {
              cccData.avgValues = { avg1: (vals.reduce((a, v) => a + v.t1, 0) / vals.length).toFixed(2), avg2: (vals.reduce((a, v) => a + v.t2, 0) / vals.length).toFixed(2), count: vals.length };
              grouped[r].divisions[d].cccAverages.push({ c, ...cccData.avgValues });
            } else cccData.avgValues = { avg1: "0.00", avg2: "0.00", count: 0 };
          });
          const dData = grouped[r].divisions[d], vCCCs = dData.cccAverages.filter(a => a.count > 0);
          if (vCCCs.length > 0) {
            dData.avgValues = { avg1: vCCCs.reduce((a, v) => a + parseFloat(v.avg1), 0).toFixed(2), avg2: vCCCs.reduce((a, v) => a + parseFloat(v.avg2), 0).toFixed(2), count: vCCCs.length };
            grouped[r].cccAverages.push({ d, ...dData.avgValues });
          } else dData.avgValues = { avg1: "0.00", avg2: "0.00", count: 0 };
        });
        const rData = grouped[r], vDivs = rData.cccAverages.filter(a => a.count > 0);
        if (vDivs.length > 0) rData.avgValues = { avg1: vDivs.reduce((a, v) => a + parseFloat(v.avg1), 0).toFixed(2), avg2: vDivs.reduce((a, v) => a + parseFloat(v.avg2), 0).toFixed(2), count: vDivs.length };
        else rData.avgValues = { avg1: "0.00", avg2: "0.00", count: 0 };
      });

      let html = `<div class="table-responsive"><table class="table table-bordered table-sm"><thead><tr><th colspan="4">Entity</th><th class="text-end"><span class="metric-label">${col1Short}</span></th><th class="text-end"><span class="metric-label">${col2Short}</span></th></tr></thead><tbody>`;
      Object.keys(grouped).sort().forEach((r, rIdx) => {
        const rId = `region-${containerId}-${rIdx}`, rData = grouped[r];
        if (rData.avgValues.count === 0) return;
        const rCount = Object.keys(rData.divisions).filter(dn => rData.divisions[dn].avgValues.count > 0).length;
        html += `<tr class="table-primary region-row" data-target="${rId}"><td colspan="4"><span class="toggle-icon">▶</span>${r} (${rCount})</td><td class="text-end">${rData.avgValues.avg1}</td><td class="text-end">${rData.avgValues.avg2}</td></tr>`;
        Object.keys(rData.divisions).sort().forEach((d, dIdx) => {
          const dId = `${rId}-div-${dIdx}`, dData = rData.divisions[d];
          if (dData.avgValues.count === 0) return;
          const dCount = Object.keys(dData.cccs).filter(cn => dData.cccs[cn].avgValues.count > 0).length;
          html += `<tr class="table-secondary division-row nested-row" data-parent="${rId}" data-target="${dId}"><td></td><td colspan="3"><span class="toggle-icon">▶</span>${d} (${dCount})</td><td class="text-end">${dData.avgValues.avg1}</td><td class="text-end">${dData.avgValues.avg2}</td></tr>`;
          Object.keys(dData.cccs).sort().forEach((c, cIdx) => {
            const cData = dData.cccs[c], cId = `${dId}-ccc-${cIdx}`;
            if (cData.avgValues.count === 0) return;
            const cCount = Object.keys(cData.dates).filter(dt => cData.dates[dt].hasData).length;
            html += `<tr class="ccc-row nested-row" data-parent="${dId}" data-target="${cId}"><td></td><td></td><td colspan="2"><span class="toggle-icon">▶</span>${c} (${cCount} dates)</td><td class="text-end">${cData.avgValues.avg1}</td><td class="text-end">${cData.avgValues.avg2}</td></tr>`;
            Object.keys(cData.dates).sort((a, b) => { const pA = a.split('/'); const pB = b.split('/'); return new Date(pB[2], pB[1] - 1, pB[0]) - new Date(pA[2], pA[1] - 1, pA[0]); }).forEach(dt => {
              if (!cData.dates[dt].hasData) return;
              html += `<tr class="date-row nested-row" data-parent="${cId}"><td></td><td></td><td></td><td>${formatDate(dt)}</td><td class="text-end">${cData.dates[dt].total1}</td><td class="text-end">${cData.dates[dt].total2}</td></tr>`;
            });
          });
        });
      });
      html += `</tbody></table></div>`;
      document.getElementById(containerId).innerHTML = html;

      const addToggle = (sel) => {
        document.querySelectorAll(`#${containerId} ${sel}`).forEach(row => {
          row.addEventListener('click', function (e) {
            if (sel !== '.region-row') e.stopPropagation();
            this.classList.toggle('expanded');
            const tid = this.getAttribute('data-target');
            document.querySelectorAll(`[data-parent="${tid}"]`).forEach(el => el.classList.toggle('show-row'));
          });
        });
      };
      addToggle('.region-row'); addToggle('.division-row'); addToggle('.ccc-row');
      return Object.keys(grouped).map(r => grouped[r]).filter(r => r.avgValues.count > 0).map(r => ({ avg1: parseFloat(r.avgValues.avg1), avg2: parseFloat(r.avgValues.avg2) }));
    }

    function render() {
      const data = filteredData.filter(row => applyRowFilters(row));
      let types = category === "ALL" ? (data.length > 0 && "Pending as on Monday of Last Week (All)" in data[0] ? ["All"] : ["DOM", "COM", "IND"]) : [category];

      const pA = buildNestedTable("pending-table", data, types, "Pending as on Monday of Last Week", "Pending as on Monday of Current Week");
      const dA = buildNestedTable("deposit-table", data, types, "Deposited in last week", "Total disposed");

      if (pA.length > 0) {
        const s1 = pA.reduce((a, v) => a + v.avg1, 0).toFixed(2), s2 = pA.reduce((a, v) => a + v.avg2, 0).toFixed(2);
        document.getElementById("pending-avg").innerHTML = `<span class="metric-label">Last Monday:</span> <span class="metric-value">${s1}</span>, <span class="metric-label">This Monday:</span> <span class="metric-value">${s2}</span>`;
      } else document.getElementById("pending-avg").innerHTML = `<span class="metric-label">Last Monday:</span> <span class="metric-value">0.00</span>, <span class="metric-label">This Monday:</span> <span class="metric-value">0.00</span>`;

      if (dA.length > 0) {
        const s1 = dA.reduce((a, v) => a + v.avg1, 0), s2 = dA.reduce((a, v) => a + v.avg2, 0), b = s1 - s2;
        let c = b > 0 ? 'red' : (b < 0 ? 'green' : 'black');
        document.getElementById("deposit-avg").innerHTML = `<span class="metric-label">Deposited:</span> <span class="metric-value">${s1.toFixed(2)}</span>, <span class="metric-label">Disposed:</span> <span class="metric-value">${s2.toFixed(2)}</span>, <span class="metric-label">Backlog:</span> <span class="metric-value" style="color:${c};">${b.toFixed(2)}</span>`;
      } else document.getElementById("deposit-avg").innerHTML = `<span class="metric-label">Deposited:</span> <span class="metric-value">0.00</span>, <span class="metric-label">Disposed:</span> <span class="metric-value">0.00</span>, <span class="metric-label">Backlog:</span> <span class="metric-value">0.00</span>`;

      if (typeof renderBacklogChart === 'function') renderBacklogChart();
    }

    function getBacklogChartData() {
      const data = filteredData.filter(row => applyRowFilters(row));
      let types = category === "ALL" ? (data.length > 0 && "Deposited in last week (All)" in data[0] ? ["All"] : ["DOM", "COM", "IND"]) : [category];
      const groups = {};
      data.forEach(row => {
        const dt = row["Date of report in Current Week"]; if (!dt) return;
        if (!groups[dt]) groups[dt] = { dep: 0, dis: 0, wit: 0 };
        types.forEach(type => {
          const dCol = type === "All" ? "Deposited in last week (All)" : `Deposited in last week (${type})`;
          const sCol = type === "All" ? "Total disposed (All)" : `Total disposed (${type})`;
          const wCol = type === "All" ? "Withheld (All)" : `Withheld (${type})`;
          groups[dt].dep += parseInt(row[dCol] || 0);
          groups[dt].dis += parseInt(row[sCol] || 0);
          groups[dt].wit += parseInt(row[wCol] || 0);
        });
      });
      const sorted = Object.keys(groups).sort((a, b) => {
        const pA = a.split('/'); const pB = b.split('/');
        return new Date(pA[2], pA[1] - 1, pA[0]) - new Date(pB[2], pB[1] - 1, pB[0]);
      });
      return {
        labels: sorted,
        data: sorted.map(d => groups[d].dep - groups[d].dis),
        tooltips: sorted.map(d => ({ dep: groups[d].dep, dis: groups[d].dis, wit: groups[d].wit }))
      };
    }

    function renderBacklogChart() {
      if (typeof Chart === 'undefined') { setTimeout(renderBacklogChart, 100); return; }
      const chartData = getBacklogChartData();
      if (window.backlogChartInstance) window.backlogChartInstance.destroy();
      const ctx = document.getElementById('backlogChart').getContext('2d');
      window.backlogChartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: chartData.labels,
          datasets: [{
            label: 'Weekly Backlog',
            data: chartData.data,
            backgroundColor: chartData.data.map(v => v > 0 ? 'rgba(255, 99, 132, 0.6)' : 'rgba(54, 162, 235, 0.6)'),
            borderColor: chartData.data.map(v => v > 0 ? 'rgba(255, 99, 132, 1)' : 'rgba(54, 162, 235, 1)'),
            borderWidth: 1
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: { x: { ticks: { maxRotation: 90, minRotation: 90 } }, y: { beginAtZero: true, title: { display: true, text: 'Backlog (Deposited - Disposed)' } } },
          plugins: {
            tooltip: {
              enabled: false,
              external: function (context) {
                let tel = document.getElementById('chartjs-tooltip');
                if (!tel) { tel = document.createElement('div'); tel.id = 'chartjs-tooltip'; tel.innerHTML = '<table></table>'; document.body.appendChild(tel); }
                const model = context.tooltip;
                if (model.opacity === 0) { tel.style.opacity = 0; return; }
                const idx = model.dataPoints[0].dataIndex;
                const details = chartData.tooltips[idx];
                tel.querySelector('table').innerHTML = `
                  <thead><tr><th>${model.title[0]}</th></tr></thead>
                  <tbody>
                    <tr><td>Total Backlog: ${model.dataPoints[0].raw}</td></tr>
                    <tr><td>Deposited: ${details.dep}</td></tr>
                    <tr><td>Disposed: ${details.dis}</td></tr>
                    <tr><td style="color:red;"><b>Withheld: ${details.wit}</b></td></tr>
                  </tbody>`;
                const pos = context.chart.canvas.getBoundingClientRect();
                tel.style.opacity = 1; tel.style.position = 'absolute';
                tel.style.left = pos.left + window.pageXOffset + model.caretX + 'px';
                tel.style.top = pos.top + window.pageYOffset + model.caretY + 'px';
                tel.style.pointerEvents = 'none'; tel.style.background = 'white'; tel.style.border = '1px solid #ccc';
                tel.style.padding = '8px'; tel.style.borderRadius = '4px'; tel.style.zIndex = 1000;
              }
            }
          }
        }
      });
    }

    async function initWeeklyDashboard() {
      try {
        let dc;
        if (typeof mzoDataHub !== 'undefined') dc = await mzoDataHub.get('CACHE_WEEKLY');
        if (!dc) {
          console.log("Downloading Weekly Report data from network...");
          Papa.parse(CSV_URL, { download: true, header: true, skipEmptyLines: true, dynamicTyping: true, complete: res => handleData(res.data) });
        } else {
          console.log("Successfully fetched Weekly Report from DataHub.");
          const res = Papa.parse(dc, { header: true, skipEmptyLines: true, dynamicTyping: true });
          handleData(res.data);
        }
      } catch (e) { console.error("Error:", e); }
    }

    function handleData(rows) {
      allData = rows.filter(d => d["Date of report in Current Week"]);
      const uDates = [...new Set(allData.map(d => d["Date of report in Current Week"]))].filter(Boolean);
      if (uDates.length > 0) {
        const pDates = uDates.map(ds => { const p = ds.split('/'); return new Date(p[2], p[1] - 1, p[0]); }).filter(d => !isNaN(d.getTime()));
        const min = new Date(Math.min(...pDates)), max = new Date(Math.max(...pDates));
        document.getElementById("report-date").innerText = `Report from ${formatDate(min.toLocaleDateString('en-GB'))} to ${formatDate(max.toLocaleDateString('en-GB'))} -- ${uDates.length} weeks`;
      }
      populateFilters();

      const chartRow = document.getElementById('chart-container-row');
      chartRow.innerHTML = `
        <div class="row mt-4">
          <div class="col-12">
            <div class="card shadow">
              <div class="card-header bg-info text-white">Weekly Backlog Analysis</div>
              <div class="card-body"><canvas id="backlogChart" style="width:100%; height:300px;"></canvas></div>
            </div>
          </div>
        </div>`;

      const cs = document.createElement('script');
      cs.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js';
      cs.onload = () => render();
      document.head.appendChild(cs);
    }

    document.querySelectorAll('#category-tabs .nav-link').forEach(tab => {
      tab.addEventListener('click', e => {
        e.preventDefault();
        document.querySelectorAll('#category-tabs .nav-link').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        category = tab.getAttribute('data-type');
        render();
      });
    });

    initWeeklyDashboard();
  </script>
</body>

</html>
